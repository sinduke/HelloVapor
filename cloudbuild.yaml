timeout: "3600s"

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: asia-northeast1
  _SERVICE: hellovapor
  _IMAGE: asia-northeast1-docker.pkg.dev/intrepid-tape-493905-j1/cloud-run-source-deploy/hellovapor/hellovapor
  _SWIFT_BUILD_JOBS: "4"

steps:
  - id: Pull build cache
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - docker pull "$_IMAGE:buildcache" || true

  - id: Build image
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --cache-from
      - "$_IMAGE:buildcache"
      - --build-arg
      - "SWIFT_BUILD_JOBS=$_SWIFT_BUILD_JOBS"
      - -t
      - "$_IMAGE:$COMMIT_SHA"
      - -t
      - "$_IMAGE:buildcache"
      - .

  - id: Push image
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - "$_IMAGE:$COMMIT_SHA"

  - id: Push build cache
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - "$_IMAGE:buildcache"

  - id: Deploy Cloud Run
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "$_SERVICE"
      - --image
      - "$_IMAGE:$COMMIT_SHA"
      - --region
      - "$_REGION"
      - --platform
      - managed
      - --quiet

images:
  - "$_IMAGE:$COMMIT_SHA"
  - "$_IMAGE:buildcache"
